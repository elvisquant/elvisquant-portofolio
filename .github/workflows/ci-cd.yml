name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate Dynamic Metadata
        id: meta
        run: |
          # Professional way to handle tags
          REPO="elvispro1993/elvisquant-portofolio"
          SHA=$(git rev-parse --short HEAD)

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${REPO}:${SHA},${REPO}:latest"
          else
            TAGS="${REPO}:${SHA}"
          fi

          echo "docker_tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Pushed with Tags: ${TAGS}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.docker_tags }}
          # King Senior Move: Using GHA Cache speeds up builds by 300%
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment Verification
        run: |
          echo "Status: Image successfully pushed to registry."
          echo "Deployment Target: Docker Hub"
          echo "Verification Tag: ${{ steps.meta.outputs.docker_tags }}"
